name: Test and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Check deploy secrets
        id: deploy_config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          set -eu
          if [ -n "$SSH_PRIVATE_KEY" ] && \
             [ -n "$SSH_HOST" ] && \
             [ -n "$SSH_USER" ] && \
             [ -n "$DEPLOY_PATH" ] && \
             [ -n "$APP_BASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not configured yet. Tests passed; deployment skipped."
          fi

      - name: Configure SSH
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && \
             git fetch origin main && \
             git checkout main && \
             git merge --ff-only origin/main && \
             DEPLOY_COMMIT='$GITHUB_SHA' \
             HEALTH_URL='${APP_BASE_URL%/}/health' \
             READY_URL='${APP_BASE_URL%/}/ready' \
             sh deploy/remote_deploy.sh"
